tag:
  - longbench
task: longbench_triviaqa
dataset_path: THUDM/LongBench
dataset_kwargs:
  trust_remote_code: true
test_split: test
dataset_name: triviaqa
doc_to_text: 'Answer the question based on the given passage. Only give me the answer and do not output any other words. The following are some examples.

{{context}}

{{input}}'
doc_to_target: '{{answers}}'
process_results: !function metrics.get_qa_f1_score
generation_kwargs:
  max_gen_toks: 32
  temperature: 0
  do_sample: False
  until: ["\n"]
metric_list:
  - metric: "qa_f1_score"
    aggregation: mean
    higher_is_better: True
metadata:
  version: 3.0
  apply_chat_template: true
