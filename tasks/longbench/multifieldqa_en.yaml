tag:
  - longbench
task: longbench_multifieldqa_en
dataset_path: THUDM/LongBench
dataset_kwargs:
  trust_remote_code: true
test_split: test
dataset_name: multifieldqa_en
doc_to_text: 'Read the following text and answer briefly.

{{context}}

Now, answer the following question based on the above text, only give me the answer and do not output any other words.

Question: {{input}}
Answer:'
doc_to_target: '{{answers}}'
process_results: !function metrics.get_qa_f1_score
generation_kwargs:
  max_gen_toks: 64
  temperature: 0
  do_sample: False
  until: []
metric_list:
  - metric: "qa_f1_score"
    aggregation: mean
    higher_is_better: True
metadata:
  version: 3.0
  apply_chat_template: true
